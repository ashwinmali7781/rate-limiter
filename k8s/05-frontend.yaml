apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: throttle
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          # Build with your Clerk publishable key baked in at build time:
          #   docker build -t ghcr.io/YOUR_ORG/YOUR_REPO/frontend:latest \
          #     --build-arg VITE_CLERK_PUBLISHABLE_KEY=pk_live_xxx ./frontend
          image: ghcr.io/YOUR_ORG/YOUR_REPO/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: throttle
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
