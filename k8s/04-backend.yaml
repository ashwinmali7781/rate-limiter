apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: throttle
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          # Build and push this image first, e.g.:
          #   docker build -t ghcr.io/YOUR_ORG/YOUR_REPO/backend:latest ./backend
          #   docker push ghcr.io/YOUR_ORG/YOUR_REPO/backend:latest
          image: ghcr.io/YOUR_ORG/YOUR_REPO/backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef: { name: throttle-config }
            - secretRef: { name: throttle-secrets }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: throttle
spec:
  selector: { app: backend }
  ports:
    - port: 4000
      targetPort: 4000
---
# Scales the rate limiter's own capacity under load. Since rule state lives
# in Redis (not in-process), backend pods are stateless and safe to scale
# horizontally without any sticky-session concerns.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: throttle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
