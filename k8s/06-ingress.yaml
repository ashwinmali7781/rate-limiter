# Assumes an ingress-nginx controller and cert-manager ClusterIssuer named
# "letsencrypt" are already installed on the cluster. Adjust annotations
# for your actual ingress controller/cert issuer if different.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: throttle
  namespace: throttle
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["your-domain.example.com"]
      secretName: throttle-tls
  rules:
    - host: your-domain.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 4000 } }
          - path: /socket.io
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 4000 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
