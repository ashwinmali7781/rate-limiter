# Starter manifest - same caveat as Redis: for production, prefer managed
# MongoDB (Atlas) or a proper StatefulSet + replica set instead of a single
# pod. This is enough to get the stack running end-to-end on a cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: throttle
spec:
  replicas: 1
  selector:
    matchLabels: { app: mongo }
  template:
    metadata:
      labels: { app: mongo }
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: throttle
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 5Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: throttle
spec:
  selector: { app: mongo }
  ports:
    - port: 27017
      targetPort: 27017
